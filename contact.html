<!-- CONTACT SECTION -->
<section class="contact">

  <h2>Send Us a Message</h2>

  <form id="contact-form" action="https://formspree.io/f/xreykvdv" method="POST">

    <!-- Honeypot for spam -->
    <input type="text" name="_gotcha" style="display:none">

    <!-- Inquiry type (required) -->
    <label for="inquiry">Type of Inquiry *</label>
    <select name="inquiry" id="inquiry" required>
      <option value="">Select One</option>
      <option>General Inquiry</option>
      <option>Success Story / Testimonial</option>
      <option>Technical Support</option>
      <option>Comments & Feedback</option>
      <option>Content Request / Suggestion</option>
      <option>Media / Press Inquiry</option>
      <option>Partnership Opportunity</option>
    </select>

    <!-- Optional first and last name -->
    <label>First Name</label>
    <input type="text" name="first_name">

    <label>Last Name</label>
    <input type="text" name="last_name">

    <!-- Required email -->
    <label>Email Address *</label>
    <input type="email" name="email" required>

    <!-- Optional organization -->
    <label>Organization</label>
    <input type="text" name="organization">

    <!-- Preferred contact method -->
    <label>Preferred Method of Contact</label>
    <select name="contact_method">
      <option>Email</option>
      <option>Phone</option>
    </select>

    <!-- Message (required) -->
    <label>Message *</label>
    <textarea name="message" maxlength="750" required></textarea>
    <p class="char-note">
      Characters left: <span id="char-count">750</span>
    </p>

    <!-- Submit button -->
    <button type="submit">Send Message</button>

  </form>

</section>

<!-- CONTACT FORM SCRIPT -->
<script>
const form = document.getElementById('contact-form');
const messageField = form.querySelector('textarea[name="message"]');
const charCount = document.getElementById('char-count');

// Character counter
messageField.addEventListener('input', () => {
  const remaining = 750 - messageField.value.length;
  charCount.textContent = remaining >= 0 ? remaining : 0;
});

// Form submission
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Block links in message
  if (messageField.value.includes("http")) {
    alert("Links are not allowed in messages.");
    return;
  }

  const data = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      window.location.href = 'thankyou.html';
    } else {
      alert('Oops! There was a problem submitting your form. Please try again.');
    }
  } catch (error) {
    alert('Network error. Please try again later.');
    console.error(error);
  }
});
</script>

if(menu.classList.contains("active")){

</script>
