<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | TestingNation Wellness</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<!-- HERO -->

<section class="hero">

<video autoplay muted loop playsinline class="hero-video">
<source src="video/banner.mp4" type="video/mp4">
</video>


<!-- NAVBAR -->

<nav>

<div class="nav-container">

<a href="index.html" class="home-icon">⌂</a>

<div class="menu-toggle" id="menu-toggle">☰</div>

</div>

</nav>


<!-- HERO TEXT -->

<div class="hero-content">
<h1>Contact Us</h1>
<p>We welcome your questions, feedback, and collaboration ideas</p>
</div>

</section>



<!-- SIDE MENU -->

<div id="menu">

<ul>
<li><a href="about.html">About</a></li>
<li><a href="resources.html">Resources</a></li>
<li><a href="#">Journal</a></li>
<li><a href="#">Blog</a></li>
<li><a href="#">Tools</a></li>
<li><a href="#">Connect</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="#">FAQ</a></li>
</ul>

</div>



<!-- CONTACT SECTION -->

<section class="contact">

<h2>Send Us a Message</h2>

<form action="https://formspree.io/f/xreykvdv" method="POST">

<input type="hidden" name="_redirect" value="thankyou.html">

<input type="text" name="_gotcha" style="display:none">

<label for="inquiry">Type of Inquiry *</label>

<select name="inquiry" id="inquiry" required>
<option value="">Select One</option>
<option>General Inquiry</option>
<option>Success Story / Testimonial</option>
<option>Technical Support</option>
<option>Comments & Feedback</option>
<option>Content Request / Suggestion</option>
<option>Media / Press Inquiry</option>
<option>Partnership Opportunity</option>
</select>


<label>First Name</label>
<input type="text" name="first_name">

<label>Last Name</label>
<input type="text" name="last_name">


<label>Email Address *</label>
<input type="email" name="email" required>


<label>Organization</label>
<input type="text" name="organization">


<label>Preferred Method of Contact</label>

<select name="contact_method">
<option>Email</option>
<option>Phone</option>
</select>


<label>Message *</label>

<textarea name="message" maxlength="750" required></textarea>

<p class="char-note">Maximum 750 characters</p>


<!-- Spam Protection -->

<input type="text" name="_gotcha" style="display:none">


<button type="submit">Submit Message</button>

</form>

</section>



<!-- FOOTER -->

<footer>

<p>© 2026 TestingNation Wellness</p>

</footer>



<!-- MENU SCRIPT -->

<script>

const toggle = document.getElementById("menu-toggle");
const menu = document.getElementById("menu");

toggle.addEventListener("click", () => {

menu.classList.toggle("active");

if(menu.classList.contains("active")){
toggle.innerHTML = "✕";
}else{
toggle.innerHTML = "☰";
}

});

</script>


</body>
</html>

</section>
